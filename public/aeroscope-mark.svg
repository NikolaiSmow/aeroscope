<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">AeroScope mark</title>
  <desc id="desc">A radar scope ring with a precise aircraft vector crossing the center.</desc>
  <defs>
    <linearGradient id="scope-gradient" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset=".52" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#09090b"/>
  <path d="M32 9a23 23 0 1 1 0 46 23 23 0 0 1 0-46Z" fill="none" stroke="#27272a" stroke-width="2"/>
  <path d="M32 16a16 16 0 1 1 0 32 16 16 0 0 1 0-32Z" fill="none" stroke="#18181b" stroke-width="1.5"/>
  <path d="M32 8v8M32 48v8M8 32h8M48 32h8" stroke="#3f3f46" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 32 50 16" stroke="url(#scope-gradient)" stroke-width="2.6" stroke-linecap="round" filter="url(#soft-glow)"/>
  <path d="M18 45 45 20" stroke="#67e8f9" stroke-width="1.4" stroke-linecap="round" opacity=".32"/>
  <path d="M43.6 18.9 53.7 13.4 49.2 24.1l-2.4-4-4.4-.3Z" fill="url(#scope-gradient)" filter="url(#soft-glow)"/>
  <circle cx="32" cy="32" r="3.2" fill="#09090b" stroke="#a7f3d0" stroke-width="2"/>
</svg>
